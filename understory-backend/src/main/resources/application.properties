spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:h2:mem:understory;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=false}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:sa}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:}
spring.datasource.driver-class-name=${SPRING_DATASOURCE_DRIVER:org.h2.Driver}

spring.sql.init.mode=never
spring.jpa.hibernate.ddl-auto=create-drop

server.port=${PORT:8082}

app.admin.passcode=pro

# Email Configuration - Gmail SMTP
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${MAIL_USERNAME}
spring.mail.password=${MAIL_PASSWORD}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true
spring.mail.properties.mail.smtp.connectiontimeout=5000
spring.mail.properties.mail.smtp.timeout=5000
spring.mail.properties.mail.smtp.writetimeout=5000

# OTP Configuration
otp.length=6
otp.expiry.minutes=10
otp.resend.cooldown.seconds=60
otp.max.attempts=5

# Email configuration
email.from=${MAIL_FROM}
email.from.name=Understory Shop
